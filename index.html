<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Pallete Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-paplm..." crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Color Pallete Generator</h1>
        <button id="generate-btn">
          <i class="fas fa-sync-alt"></i>
          Generate Pallete
        </button>
        <div class="pallete-container">
          <!--color box 1 -->
          <div class="color-box">
            <div class="color" style="background-color: #e1f5fe;"></div>
             <div class="color-info">
                <span class="hex-value">#e1f5fe</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                 
             </div>
          </div>

          <!--color box 2 -->
          <div class="color-box">
            <div class="color" style="background-color: #0c2632;"></div>
             <div class="color-info">
                <span class="hex-value">#0c2632</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                 
             </div>
          </div>

          <!--color box 3 -->
          <div class="color-box">
            <div class="color" style="background-color: #599cbb;"></div>
             <div class="color-info">
                <span class="hex-value">#599cbb</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                 
             </div>
          </div>

          <!--color box 4 -->
          <div class="color-box">
            <div class="color" style="background-color: #2b6a87;"></div>
             <div class="color-info">
                <span class="hex-value">#2b6a87</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                 
             </div>
          </div>
          
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
